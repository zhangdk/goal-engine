<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="#fcfcfc" rx="10"/>
  
  <!-- Flow Steps -->
  <rect x="20" y="110" width="100" height="80" fill="#e9ecef" stroke="#343a40" rx="5"/>
  <text x="70" y="145" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">1. Start</text>
  <text x="70" y="165" font-family="Arial" font-size="10" text-anchor="middle">Assign Goal</text>

  <rect x="150" y="110" width="120" height="80" fill="#d1ecf1" stroke="#0c5460" rx="5"/>
  <text x="210" y="145" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">2. Attempt</text>
  <text x="210" y="165" font-family="Arial" font-size="10" text-anchor="middle">Call Skill</text>

  <rect x="300" y="90" width="140" height="120" fill="#fff3cd" stroke="#856404" rx="5"/>
  <text x="370" y="130" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">3. Failure &amp; Gap</text>
  <text x="370" y="150" font-family="Arial" font-size="10" text-anchor="middle">Harness Intercept</text>
  <text x="370" y="170" font-family="Arial" font-size="10" text-anchor="middle">Trace Sent back</text>

  <rect x="470" y="110" width="140" height="80" fill="#f8d7da" stroke="#721c24" rx="5"/>
  <text x="540" y="145" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">4. Evolution</text>
  <text x="540" y="165" font-family="Arial" font-size="10" text-anchor="middle">Policy Update</text>

  <rect x="640" y="110" width="140" height="80" fill="#d4edda" stroke="#155724" rx="5"/>
  <text x="710" y="145" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">5. Squeeze</text>
  <text x="710" y="165" font-family="Arial" font-size="10" text-anchor="middle">Skill Forge / Retry</text>

  <!-- Arrows -->
  <line x1="120" y1="150" x2="150" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)"/>
  <line x1="270" y1="150" x2="300" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)"/>
  <line x1="440" y1="150" x2="470" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)"/>
  <line x1="610" y1="150" x2="640" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)"/>
  <path d="M 710 110 Q 710 40 400 40 T 210 110" fill="none" stroke="#28a745" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow-green)"/>
  <text x="460" y="30" font-family="Arial" font-size="12" font-style="italic" fill="#28a745">Evolution Loop (Carry Reflection)</text>

  <defs>
    <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
    </marker>
  </defs>
</svg>
