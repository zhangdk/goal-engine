<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f4f7f6" rx="10"/>
  
  <!-- Cognitive Layer -->
  <rect x="50" y="30" width="500" height="70" fill="#007bff" rx="5"/>
  <text x="300" y="60" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">Cognitive &amp; Governance Layer (Goal Engine)</text>
  <text x="300" y="85" font-family="Arial" font-size="11" text-anchor="middle" fill="#e0e0e0">Goal Persistence | Skill Sharing | Policy Alignment</text>

  <!-- Logic Layer -->
  <rect x="50" y="115" width="500" height="70" fill="#17a2b8" rx="5"/>
  <text x="300" y="145" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">Logic &amp; Adaptive Layer (Agent Adapter)</text>
  <text x="300" y="170" font-family="Arial" font-size="11" text-anchor="middle" fill="#e0e0e0">Reflection Engine | Knowledge Writeback | Policy Mapping</text>

  <!-- Execution Layer -->
  <rect x="50" y="200" width="500" height="70" fill="#6c757d" rx="5"/>
  <text x="300" y="230" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">Execution &amp; Physical Layer (Harness)</text>
  <text x="300" y="255" font-family="Arial" font-size="11" text-anchor="middle" fill="#e0e0e0">Sandbox Isolation | Tool Interception | External Access</text>

  <!-- Stack Indicators -->
  <path d="M 570 30 L 570 270" stroke="#333" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="585" y="150" font-family="Arial" font-size="12" transform="rotate(90, 585, 150)" text-anchor="middle">Data Flow</text>

  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
