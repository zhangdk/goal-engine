<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8f9fa" rx="10"/>
  <!-- Central Hub -->
  <rect x="200" y="40" width="200" height="120" fill="#e7f3ff" stroke="#007bff" stroke-width="2" rx="5"/>
  <text x="300" y="75" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#0056b3">Goal Engine Service</text>
  <text x="300" y="100" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">(Centralized Brain)</text>
  <rect x="210" y="115" width="180" height="35" fill="#fff" stroke="#007bff" stroke-dasharray="4" rx="3"/>
  <text x="300" y="137" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">SQLite: Goals, Policies, Skills</text>

  <!-- Node A -->
  <rect x="40" y="240" width="140" height="100" fill="#fff" stroke="#28a745" stroke-width="2" rx="5"/>
  <text x="110" y="265" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e7e34">Node A</text>
  <text x="110" y="285" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">Harness + Adapter</text>
  <circle cx="110" cy="315" r="15" fill="#28a745"/>
  <text x="110" y="319" font-family="Arial" font-size="10" text-anchor="middle" fill="#fff">Agent</text>

  <!-- Node B -->
  <rect x="230" y="240" width="140" height="100" fill="#fff" stroke="#28a745" stroke-width="2" rx="5"/>
  <text x="300" y="265" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e7e34">Node B</text>
  <text x="300" y="285" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">Harness + Adapter</text>
  <circle cx="300" cy="315" r="15" fill="#28a745"/>
  <text x="300" y="319" font-family="Arial" font-size="10" text-anchor="middle" fill="#fff">Agent</text>

  <!-- Node C -->
  <rect x="420" y="240" width="140" height="100" fill="#fff" stroke="#28a745" stroke-width="2" rx="5"/>
  <text x="490" y="265" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e7e34">Node C</text>
  <text x="490" y="285" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">Harness + Adapter</text>
  <circle cx="490" cy="315" r="15" fill="#28a745"/>
  <text x="490" y="319" font-family="Arial" font-size="10" text-anchor="middle" fill="#fff">Agent</text>

  <!-- Connections -->
  <path d="M 110 240 Q 110 180 200 140" fill="none" stroke="#007bff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 300 240 L 300 160" fill="none" stroke="#007bff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 490 240 Q 490 180 400 140" fill="none" stroke="#007bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#007bff" />
    </marker>
  </defs>
</svg>
