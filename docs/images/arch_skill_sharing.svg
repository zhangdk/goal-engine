<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#ffffff" rx="10"/>
  
  <!-- Node 1 -->
  <rect x="30" y="50" width="160" height="100" fill="#f8f9fa" stroke="#28a745" stroke-width="2" rx="5"/>
  <text x="110" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Agent A (Node 1)</text>
  <rect x="45" y="90" width="130" height="40" fill="#fff3cd" rx="3"/>
  <text x="110" y="105" font-family="Arial" font-size="10" text-anchor="middle">Hunts New Skill</text>
  <text x="110" y="120" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">(New Code Generated)</text>

  <!-- Central Hub -->
  <circle cx="300" cy="150" r="50" fill="#007bff" opacity="0.1"/>
  <rect x="250" y="125" width="100" height="50" fill="#007bff" rx="5"/>
  <text x="300" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Skill Library</text>

  <!-- Node 2 -->
  <rect x="410" y="150" width="160" height="100" fill="#f8f9fa" stroke="#007bff" stroke-width="2" rx="5"/>
  <text x="490" y="175" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Agent B (Node 2)</text>
  <rect x="425" y="190" width="130" height="40" fill="#d4edda" rx="3"/>
  <text x="490" y="205" font-family="Arial" font-size="10" text-anchor="middle">Downloads Skill</text>
  <text x="490" y="220" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">(Instant Success)</text>

  <!-- Sharing Arrows -->
  <path d="M 190 100 L 250 140" fill="none" stroke="#fd7e14" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="210" y="110" font-family="Arial" font-size="10" fill="#fd7e14" transform="rotate(30, 210, 110)">Upload</text>
  
  <path d="M 350 160 L 410 200" fill="none" stroke="#28a745" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="370" y="180" font-family="Arial" font-size="10" fill="#28a745" transform="rotate(30, 370, 180)">Download</text>

  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fd7e14" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745" />
    </marker>
  </defs>
</svg>
