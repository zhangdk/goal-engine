<svg width="980" height="640" viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Goal Engine 职责关系图</title>
  <desc id="desc">展示 Local Agent、Goal Engine Service、Loop Runtime 三者的职责边界与数据流。</desc>

  <defs>
    <style>
      .bg { fill: #f6f3ee; }
      .title { font: 700 28px Georgia, serif; fill: #1f2937; }
      .subtitle { font: 400 14px Georgia, serif; fill: #4b5563; }
      .box-title { font: 700 20px Georgia, serif; fill: #111827; }
      .body { font: 400 14px Georgia, serif; fill: #1f2937; }
      .small { font: 400 13px Georgia, serif; fill: #374151; }
      .label { font: 700 13px Georgia, serif; fill: #111827; }
      .agent { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .service { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 18; }
      .runtime { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 18; }
      .note { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.5; rx: 14; }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .arrow-orange { stroke: #d97706; stroke-width: 2.5; fill: none; marker-end: url(#arrowOrange); }
      .arrow-gray { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowGray); }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="640"/>

  <text class="title" x="40" y="48">Goal Engine 三层职责关系</text>
  <text class="subtitle" x="40" y="74">核心结论：Service 不是远程大脑，而是长期控制内核；真正的续跑由 Loop Runtime 负责。</text>

  <rect class="agent" x="40" y="130" width="260" height="280"/>
  <text class="box-title" x="60" y="165">Local Agent</text>
  <text class="body" x="60" y="200">职责：</text>
  <text class="small" x="60" y="226">• 当前轮推理</text>
  <text class="small" x="60" y="248">• 执行动作 / 调工具</text>
  <text class="small" x="60" y="270">• 生成本轮局部计划</text>
  <text class="small" x="60" y="292">• 遇到失败后触发写回</text>

  <text class="body" x="60" y="332">不负责：</text>
  <text class="small" x="60" y="358">• 长期事实存储</text>
  <text class="small" x="60" y="380">• policy 归纳与规则判断</text>
  <text class="small" x="60" y="402">• 自动拉起下一轮 session</text>

  <rect class="service" x="360" y="110" width="260" height="320"/>
  <text class="box-title" x="380" y="145">Goal Engine Service</text>
  <text class="body" x="380" y="180">本质角色：</text>
  <text class="small" x="380" y="206">• 事实源</text>
  <text class="small" x="380" y="228">• 规则执行层</text>
  <text class="small" x="380" y="250">• 恢复中心</text>

  <text class="body" x="380" y="290">核心职责：</text>
  <text class="small" x="380" y="316">• 保存 Goal / Attempt / Reflection / Policy</text>
  <text class="small" x="380" y="338">• 把失败转成 policy</text>
  <text class="small" x="380" y="360">• 执行 retry guard</text>
  <text class="small" x="380" y="382">• 生成 recovery packet</text>
  <text class="small" x="380" y="404">• 提供统一长期状态接口</text>

  <rect class="runtime" x="680" y="130" width="260" height="280"/>
  <text class="box-title" x="700" y="165">Loop Runtime</text>
  <text class="body" x="700" y="200">职责：</text>
  <text class="small" x="700" y="226">• heartbeat / cron / session bootstrap</text>
  <text class="small" x="700" y="248">• 检查 active goal 是否仍未完成</text>
  <text class="small" x="700" y="270">• 拉起下一轮 session</text>
  <text class="small" x="700" y="292">• 注入 recovery packet / policy 摘要</text>
  <text class="small" x="700" y="314">• 保证关键 hook 不被跳过</text>

  <text class="body" x="700" y="354">不负责：</text>
  <text class="small" x="700" y="380">• 长期规则建模</text>
  <text class="small" x="700" y="402">• 替 Agent 完成推理</text>

  <path class="arrow-blue" d="M300 220 C330 220, 330 220, 360 220"/>
  <text class="label" x="318" y="208">读长期状态</text>

  <path class="arrow-blue" d="M300 300 C330 300, 330 300, 360 300"/>
  <text class="label" x="316" y="288">写回 attempt / reflection</text>

  <path class="arrow-green" d="M620 190 C650 190, 650 190, 680 190"/>
  <text class="label" x="640" y="178">提供 recovery / policy</text>

  <path class="arrow-orange" d="M680 340 C650 340, 650 340, 620 340"/>
  <text class="label" x="632" y="328">定时读取状态</text>

  <path class="arrow-orange" d="M810 410 C810 470, 170 470, 170 410"/>
  <text class="label" x="408" y="462">拉起下一轮 session / 注入最小恢复信息</text>

  <path class="arrow-gray" d="M490 430 L490 540"/>
  <text class="label" x="512" y="490">产物</text>

  <rect class="note" x="210" y="540" width="560" height="70"/>
  <text class="box-title" x="230" y="570">核心分工</text>
  <text class="small" x="230" y="594">Agent 负责“这一轮怎么做”，Service 负责“长期该记住什么、约束什么、恢复什么”，</text>
  <text class="small" x="230" y="614">Runtime 负责“下一轮为什么会再次发生”。三者缺一不可。</text>
</svg>
